<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Secure Browser Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: #131842;
            padding: 1.2rem 2rem;
            border-bottom: 2px solid #00d4aa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { color: #00d4aa; font-size: 1.4rem; }
        
        .badge {
            background: #0f3460;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            border: 1px solid #00d4aa;
            color: #00d4aa;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        .info-box {
            background: #0f3460;
            border-left: 4px solid #00d4aa;
            padding: 12px 18px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        
        .url-section {
            background: #131842;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #2a2f5a;
        }
        
        .input-group { display: flex; gap: 0.8rem; margin-top: 0.8rem; }
        
        #urlInput {
            flex: 1;
            padding: 10px 16px;
            background: #0a0e27;
            border: 2px solid #2a2f5a;
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        
        #urlInput:focus { border-color: #00d4aa; }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .btn-launch {
            background: #00d4aa;
            color: #0a0e27;
            white-space: nowrap;
        }
        
        .btn-launch:hover:not(:disabled) { background: #00ffcc; }
        .btn-launch:disabled { background: #555; cursor: not-allowed; }
        
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 1.2rem;
            margin-top: 0.8rem;
        }
        
        .session-card {
            background: #131842;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2f5a;
        }
        
        .session-header {
            background: #1a1f4a;
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .session-id {
            font-family: monospace;
            color: #00d4aa;
        }
        
        .status-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .status-starting { background: #ffd700; color: #000; }
        .status-active { background: #00d4aa; color: #000; }
        
        .session-url {
            padding: 8px 14px;
            font-size: 0.8rem;
            color: #8892b0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .session-preview {
            width: 100%;
            height: 400px;
            border: none;
            background: #000;
        }
        
        .session-footer {
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1f4a;
            font-size: 0.8rem;
        }
        
        .btn-stop {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .btn-stop:hover { background: #ff6b6b; }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .sessions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔒 Secure Browser Sandbox</h1>
        <div style="display: flex; gap: 0.8rem; align-items: center;">
            <span class="badge">CEH</span>
            <span class="badge">Security+</span>
            <span style="font-size: 0.8rem; color: #00d4aa;" id="countBadge">Active: 0</span>
        </div>
    </div>
    
    <div class="container">
        <div class="url-section">
            <h3>🚀 Launch Isolated Browser</h3>
            <div class="info-box">
                🛡️ Isolated Docker container • Ubuntu + Firefox • Auto-destroys in 30 min • No data persistence
            </div>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)" onkeypress="if(event.key==='Enter')launch()">
                <button class="btn btn-launch" id="launchBtn" onclick="launch()">🚀 Launch</button>
            </div>
        </div>
        
        <h3>Active Sessions: <span id="countDisplay" style="color: #00d4aa;">0</span></h3>
        <div class="sessions-grid" id="grid">
            <div class="empty-state" id="emptyState">
                <div style="font-size: 3rem;">🔍</div>
                <p>No active sessions</p>
            </div>
        </div>
    </div>
    
    <script>
        const sessions = new Map();
        
        async function launch() {
            const input = document.getElementById('urlInput');
            const btn = document.getElementById('launchBtn');
            let url = input.value.trim();
            
            if (!url) return alert('Enter URL');
            if (!url.startsWith('http')) { url = 'https://' + url; input.value = url; }
            
            btn.disabled = true;
            btn.textContent = 'Creating...';
            
            try {
                const res = await fetch('/api/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed');
                
                addCard(data);
                input.value = '';
            } catch(e) {
                alert('Error: ' + e.message);
            }
            btn.disabled = false;
            btn.textContent = '🚀 Launch';
        }
        
        function addCard(s) {
            document.getElementById('emptyState').style.display = 'none';
            
            const card = document.createElement('div');
            card.className = 'session-card';
            card.id = 'card-' + s.sessionId;
            card.innerHTML = `
                <div class="session-header">
                    <span class="session-id">🖥️ ${s.sessionId.substring(0,12)}...</span>
                    <span class="status-badge status-starting" id="st-${s.sessionId}">STARTING</span>
                </div>
                <div class="session-url">🔗 ${s.url}</div>
                <iframe class="session-preview" id="fr-${s.sessionId}" src="${s.streamUrl}"
                    onload="document.getElementById('st-${s.sessionId}').textContent='ACTIVE';document.getElementById('st-${s.sessionId}').className='status-badge status-active';"></iframe>
                <div class="session-footer">
                    <span id="tm-${s.sessionId}">⏱️ 30:00</span>
                    <button class="btn-stop" onclick="stop('${s.sessionId}')">⏹ Stop</button>
                </div>
            `;
            
            document.getElementById('grid').appendChild(card);
            
            const timer = setInterval(() => updateTimer(s.sessionId), 1000);
            const cleanup = setTimeout(() => stop(s.sessionId), 30*60*1000);
            
            sessions.set(s.sessionId, { ...s, timer, cleanup });
            updateCount();
        }
        
        function updateTimer(id) {
            const s = sessions.get(id);
            if (!s) return;
            const rem = Math.max(0, 1800 - Math.floor((Date.now()-s.created)/1000));
            const m = Math.floor(rem/60), sec = rem%60;
            const el = document.getElementById('tm-'+id);
            if (el) {
                el.textContent = `⏱️ ${m}:${sec.toString().padStart(2,'0')}`;
                if (rem < 300) el.style.color = '#ff4757';
            }
            if (rem <= 0) stop(id);
        }
        
        async function stop(id) {
            const s = sessions.get(id);
            if (!s) return;
            clearInterval(s.timer);
            clearTimeout(s.cleanup);
            await fetch('/api/sessions/'+id, {method:'DELETE'});
            document.getElementById('card-'+id)?.remove();
            sessions.delete(id);
            updateCount();
            if (sessions.size === 0) document.getElementById('emptyState').style.display = 'block';
        }
        
        function updateCount() {
            document.getElementById('countDisplay').textContent = sessions.size;
            document.getElementById('countBadge').textContent = 'Active: ' + sessions.size;
        }
    </script>
</body>
</html>
